name: gradient_boosting_large
description: Gradient Boosting large training template

model:
  model_type: gradient_boosting
  hyperparameters:
    n_estimators: 500
    learning_rate: 0.03
    max_depth: 7

training:
  n_folds: 10
  save_final_model: true
  verbose: true

feature:
  feature_type: combined
  morgan_bits: 1024
  morgan_radius: 2
  use_cache: true
  combination_method: mean

data:
  multi_target_strategy: independent
  nan_handling: skip
