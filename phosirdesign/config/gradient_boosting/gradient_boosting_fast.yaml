name: gradient_boosting_fast
description: Gradient Boosting fast training template

model:
  model_type: gradient_boosting
  hyperparameters:
    n_estimators: 100
    learning_rate: 0.1
    max_depth: 3

training:
  n_folds: 10
  save_final_model: true
  verbose: true

feature:
  feature_type: combined
  morgan_bits: 1024
  morgan_radius: 2
  use_cache: true
  combination_method: mean

data:
  multi_target_strategy: independent
  nan_handling: skip
