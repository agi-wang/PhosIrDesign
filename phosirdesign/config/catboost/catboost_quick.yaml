name: catboost_quick
description: CatBoost quick training template

model:
  model_type: catboost
  hyperparameters:
    iterations: 200
    depth: 6
    learning_rate: 0.1
    verbose: false

training:
  n_folds: 5
  save_final_model: true
  verbose: true

feature:
  feature_type: combined
  morgan_bits: 1024
  morgan_radius: 2
  use_cache: true
  combination_method: mean

data:
  multi_target_strategy: independent
  nan_handling: skip
