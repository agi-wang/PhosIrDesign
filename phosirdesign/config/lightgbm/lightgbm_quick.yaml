name: lightgbm_quick
description: LightGBM quick training template

model:
  model_type: lightgbm
  hyperparameters:
    n_estimators: 100
    num_leaves: 31
    learning_rate: 0.1
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 5

training:
  n_folds: 5
  save_final_model: true
  verbose: true

feature:
  feature_type: combined
  morgan_bits: 1024
  morgan_radius: 2
  use_cache: true
  combination_method: mean

data:
  multi_target_strategy: independent
  nan_handling: skip
